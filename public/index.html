<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bot Dr. Giovanni — Teste</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Montserrat', sans-serif; background: #f0f2f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 16px; }

    .chat-container {
      width: 100%; max-width: 440px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,.12);
      display: flex; flex-direction: column;
      height: 680px; overflow: hidden;
    }

    .chat-header {
      background: #1A3820;
      padding: 18px 20px;
      display: flex; align-items: center; gap: 14px;
    }
    .chat-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: #2D4A30;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .chat-header-info h3 { color: #fff; font-size: 15px; font-weight: 600; }
    .chat-header-info p { color: #7EC88A; font-size: 12px; margin-top: 2px; }
    .online-dot { display: inline-block; width: 8px; height: 8px; background: #7EC88A; border-radius: 50%; margin-right: 5px; }

    .chat-messages {
      flex: 1; overflow-y: auto; padding: 20px 16px;
      display: flex; flex-direction: column; gap: 12px;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #ddd; border-radius: 2px; }

    .msg { max-width: 80%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-break: break-word; }
    .msg.bot { background: #f0f2f5; color: #1A1A1A; border-bottom-left-radius: 4px; align-self: flex-start; }
    .msg.user { background: #1A3820; color: #fff; border-bottom-right-radius: 4px; align-self: flex-end; }
    .msg.typing { background: #f0f2f5; align-self: flex-start; padding: 12px 16px; }
    .typing-dots { display: flex; gap: 4px; align-items: center; }
    .typing-dots span { width: 7px; height: 7px; background: #999; border-radius: 50%; animation: bounce 1.2s infinite; }
    .typing-dots span:nth-child(2) { animation-delay: .2s; }
    .typing-dots span:nth-child(3) { animation-delay: .4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .chat-input-area {
      padding: 14px 16px;
      border-top: 1px solid #eee;
      display: flex; gap: 10px; align-items: flex-end;
    }
    .chat-input {
      flex: 1; border: 1.5px solid #e0e0e0; border-radius: 24px;
      padding: 10px 16px; font-family: 'Montserrat', sans-serif;
      font-size: 14px; outline: none; resize: none;
      max-height: 100px; line-height: 1.4;
      transition: border-color .2s;
    }
    .chat-input:focus { border-color: #2D4A30; }
    .send-btn {
      width: 42px; height: 42px; border-radius: 50%;
      background: #1A3820; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: background .2s;
    }
    .send-btn:hover { background: #2D4A30; }
    .send-btn svg { fill: #fff; width: 18px; height: 18px; }

    .aviso {
      text-align: center; font-size: 11px; color: #aaa;
      padding: 8px 16px 0;
    }
  </style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <div class="chat-avatar">👨‍⚕️</div>
    <div class="chat-header-info">
      <h3>Assistente Dr. Giovanni</h3>
      <p><span class="online-dot"></span>Online agora</p>
    </div>
  </div>

  <div class="chat-messages" id="messages"></div>

  <p class="aviso">Assistente virtual — ambiente de teste</p>

  <div class="chat-input-area">
    <textarea class="chat-input" id="input" placeholder="Digite sua mensagem..." rows="1"></textarea>
    <button class="send-btn" id="sendBtn" onclick="enviar()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
  let sessionId = null;

  async function iniciar() {
    const res = await fetch('/session');
    const data = await res.json();
    sessionId = data.sessionId;
    adicionarMensagem('bot', 'Olá! 👋 Sou o assistente virtual do Dr. Giovanni Fiorillo, especialista em transplante capilar. Como posso te ajudar hoje?');
  }

  function adicionarMensagem(tipo, texto) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg ' + tipo;
    div.textContent = texto;
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function mostrarDigitando() {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg typing';
    div.id = 'typing';
    div.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
  }

  function removerDigitando() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function enviar() {
    const input = document.getElementById('input');
    const texto = input.value.trim();
    if (!texto || !sessionId) return;

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('sendBtn').disabled = true;

    adicionarMensagem('user', texto);
    mostrarDigitando();

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: texto, sessionId })
      });
      const data = await res.json();
      removerDigitando();
      adicionarMensagem('bot', data.reply || data.error);
    } catch (e) {
      removerDigitando();
      adicionarMensagem('bot', 'Erro de conexão. Tente novamente.');
    }

    document.getElementById('sendBtn').disabled = false;
    input.focus();
  }

  // Enter envia, Shift+Enter quebra linha
  document.getElementById('input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
  });

  // Auto-resize textarea
  document.getElementById('input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 100) + 'px';
  });

  iniciar();
</script>

</body>
</html>
